<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="topShade" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="leftShade" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.40"/>
    </linearGradient>
    <linearGradient id="rightShade" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.20"/>
    </linearGradient>
    <radialGradient id="bloom" cx="50%" cy="48%" r="45%">
      <stop offset="0%"   stop-color="#3a4a55" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#0c0c0c" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="#111111" rx="10"/>
  <ellipse cx="32" cy="34" rx="27" ry="20" fill="url(#bloom)"/>

  <!-- ===================== TOP FACE ===================== -->
  <!-- Body base -->
  <polygon points="32,5 58,20 32,35 6,20" fill="#1a1a1a"/>

  <!-- Sticker cells - scrambled using top/back/bottom colors -->
  <!-- Cell(0,0) --> <polygon points="32,5    40.67,10  32,15   23.33,10"  fill="#AEAAA8"/>
  <!-- Cell(1,0) --> <polygon points="40.67,10 49.33,15  40.67,20 32,15"   fill="#28583A"/>
  <!-- Cell(2,0) --> <polygon points="49.33,15 58,20     49.33,25 40.67,20" fill="#AEAAA8"/>
  <!-- Cell(0,1) --> <polygon points="23.33,10 32,15     23.33,20 14.67,15" fill="#665E28"/>
  <!-- Cell(1,1) --> <polygon points="32,15    40.67,20  32,25   23.33,20"  fill="#AEAAA8"/>
  <!-- Cell(2,1) --> <polygon points="40.67,20 49.33,25  40.67,30 32,25"   fill="#665E28"/>
  <!-- Cell(0,2) --> <polygon points="14.67,15 23.33,20  14.67,25 6,20"    fill="#AEAAA8"/>
  <!-- Cell(1,2) --> <polygon points="23.33,20 32,25     23.33,30 14.67,25" fill="#28583A"/>
  <!-- Cell(2,2) --> <polygon points="32,25    40.67,30  32,35   23.33,30"  fill="#AEAAA8"/>

  <!-- Top face lighting + outline -->
  <polygon points="32,5 58,20 32,35 6,20" fill="url(#topShade)"/>
  <!-- Grid lines -->
  <line x1="40.67" y1="10"  x2="14.67" y2="25"  stroke="#111" stroke-width="1.0"/>
  <line x1="49.33" y1="15"  x2="23.33" y2="30"  stroke="#111" stroke-width="1.0"/>
  <line x1="23.33" y1="10"  x2="49.33" y2="25"  stroke="#111" stroke-width="1.0"/>
  <line x1="14.67" y1="15"  x2="40.67" y2="30"  stroke="#111" stroke-width="1.0"/>
  <polygon points="32,5 58,20 32,35 6,20" fill="none" stroke="#111" stroke-width="1.3"/>

  <!-- ===================== LEFT FACE ===================== -->
  <!-- Body base -->
  <polygon points="6,20 32,34 32,61 6,47" fill="#141414"/>

  <!-- Sticker cells - scrambled orange/red/yellow -->
  <!-- Cell(0,0) --> <polygon points="6,20    14.67,24.67 14.67,33.67 6,29"       fill="#664428"/>
  <!-- Cell(1,0) --> <polygon points="14.67,24.67 23.33,29.33 23.33,38.33 14.67,33.67" fill="#6A3232"/>
  <!-- Cell(2,0) --> <polygon points="23.33,29.33 32,34      32,43      23.33,38.33"   fill="#665E28"/>
  <!-- Cell(0,1) --> <polygon points="6,29    14.67,33.67 14.67,42.67 6,38"       fill="#6A3232"/>
  <!-- Cell(1,1) --> <polygon points="14.67,33.67 23.33,38.33 23.33,47.33 14.67,42.67" fill="#665E28"/>
  <!-- Cell(2,1) --> <polygon points="23.33,38.33 32,43      32,52      23.33,47.33"   fill="#664428"/>
  <!-- Cell(0,2) --> <polygon points="6,38    14.67,42.67 14.67,51.67 6,47"       fill="#665E28"/>
  <!-- Cell(1,2) --> <polygon points="14.67,42.67 23.33,47.33 23.33,56.33 14.67,51.67" fill="#664428"/>
  <!-- Cell(2,2) --> <polygon points="23.33,47.33 32,52      32,61      23.33,56.33"   fill="#6A3232"/>

  <!-- Left face lighting + outline -->
  <polygon points="6,20 32,34 32,61 6,47" fill="url(#leftShade)"/>
  <!-- Grid lines -->
  <line x1="6"     y1="29"    x2="32"    y2="43"    stroke="#111" stroke-width="1.0"/>
  <line x1="6"     y1="38"    x2="32"    y2="52"    stroke="#111" stroke-width="1.0"/>
  <line x1="14.67" y1="24.67" x2="14.67" y2="51.67" stroke="#111" stroke-width="1.0"/>
  <line x1="23.33" y1="29.33" x2="23.33" y2="56.33" stroke="#111" stroke-width="1.0"/>
  <polygon points="6,20 32,34 32,61 6,47" fill="none" stroke="#111" stroke-width="1.3"/>

  <!-- ===================== RIGHT FACE ===================== -->
  <!-- Body base -->
  <polygon points="32,34 58,20 58,47 32,62" fill="#181818"/>

  <!-- Sticker cells - scrambled blue/green/red -->
  <!-- Cell(0,0) --> <polygon points="32,34    40.67,29.33 40.67,38.67 32,43.33"    fill="#283F5E"/>
  <!-- Cell(1,0) --> <polygon points="40.67,29.33 49.33,24.67 49.33,34    40.67,38.67" fill="#28583A"/>
  <!-- Cell(2,0) --> <polygon points="49.33,24.67 58,20      58,29.33   49.33,34"     fill="#283F5E"/>
  <!-- Cell(0,1) --> <polygon points="32,43.33  40.67,38.67 40.67,48    32,52.67"    fill="#28583A"/>
  <!-- Cell(1,1) --> <polygon points="40.67,38.67 49.33,34    49.33,43.33 40.67,48"   fill="#283F5E"/>
  <!-- Cell(2,1) --> <polygon points="49.33,34   58,29.33   58,38.67   49.33,43.33"  fill="#6A3232"/>
  <!-- Cell(0,2) --> <polygon points="32,52.67  40.67,48    40.67,57.33 32,62"       fill="#283F5E"/>
  <!-- Cell(1,2) --> <polygon points="40.67,48   49.33,43.33 49.33,52.67 40.67,57.33" fill="#6A3232"/>
  <!-- Cell(2,2) --> <polygon points="49.33,43.33 58,38.67   58,48      49.33,52.67" fill="#28583A"/>

  <!-- Right face lighting + outline -->
  <polygon points="32,34 58,20 58,47 32,62" fill="url(#rightShade)"/>
  <!-- Grid lines -->
  <line x1="32"    y1="43.33" x2="58"    y2="29.33" stroke="#111" stroke-width="1.0"/>
  <line x1="32"    y1="52.67" x2="58"    y2="38.67" stroke="#111" stroke-width="1.0"/>
  <line x1="40.67" y1="29.33" x2="40.67" y2="57.33" stroke="#111" stroke-width="1.0"/>
  <line x1="49.33" y1="24.67" x2="49.33" y2="52.67" stroke="#111" stroke-width="1.0"/>
  <polygon points="32,34 58,20 58,47 32,62" fill="none" stroke="#111" stroke-width="1.3"/>

  <!-- ===================== OUTER SILHOUETTE ===================== -->
  <polygon points="32,5 58,20 58,47 32,62 6,47 6,20"
    fill="none" stroke="#0a0a0a" stroke-width="2.2" stroke-linejoin="round"
    filter="url(#shadow)"/>
  <!-- Inner corner edges -->
  <line x1="32" y1="34" x2="32" y2="62" stroke="#0a0a0a" stroke-width="1.8"/>
  <line x1="6"  y1="20" x2="32" y2="34" stroke="#0a0a0a" stroke-width="1.8"/>
  <line x1="58" y1="20" x2="32" y2="34" stroke="#0a0a0a" stroke-width="1.8"/>

  <!-- Top edge highlight (key light from [6,8,5]) -->
  <line x1="32" y1="5"  x2="58" y2="20" stroke="#fff" stroke-width="0.6" opacity="0.15"/>
  <line x1="32" y1="5"  x2="6"  y2="20" stroke="#fff" stroke-width="0.5" opacity="0.08"/>
</svg>
